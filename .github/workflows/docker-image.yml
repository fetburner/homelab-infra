name: Docker image

on:
  push:
    branches-ignore:
      - buildcache

permissions:
  contents: read
  packages: write

jobs:
  enumerate-dockerfiles:
    runs-on: ubuntu-slim
    outputs:
      name: ${{ steps.enumerate.outputs.name }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: json
          filters: |
            changed:
              - 'Dockerfile/**'

      - id: enumerate
        run: |
          echo "name=$(jq -c "$JQ_FILTER" <<< "$JQ_INPUT_JSON")" | tee -a "$GITHUB_OUTPUT"
        env:
          JQ_INPUT_JSON: ${{ steps.filter.outputs.changed_files }}
          JQ_FILTER: 'map( capture("^Dockerfile/(?<a>[a-zA-Z0-9_-]+)/") | .a ) | unique | .'

  docker-lint:
    runs-on: ubuntu-latest
    needs:
      - enumerate-dockerfiles
    if: ${{ needs.enumerate-dockerfiles.outputs.name != '' && toJson(fromJson(needs.enumerate-dockerfiles.outputs.name)) != '[]' }}

    strategy:
      matrix:
        name: ${{ fromJSON(needs.enumerate-dockerfiles.outputs.name) }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile/${{ matrix.name }}/Dockerfile

  docker-build-each:
    runs-on: ${{ matrix.runner }}
    needs:
      - enumerate-dockerfiles
    if: ${{ needs.enumerate-dockerfiles.outputs.name != '' && toJson(fromJson(needs.enumerate-dockerfiles.outputs.name)) != '[]' }}

    strategy:
      matrix:
        name: ${{ fromJSON(needs.enumerate-dockerfiles.outputs.name) }}
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: fetburner
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up cache
        uses: actions/cache@v6
        id: cache
        with:
          path: cache-mount
          key: cache-mount-${{ matrix.name }}-${{ matrix.arch }}-${{ hashFiles('Dockerfile/**/Dockerfile') }}
          restore-keys: |
            cache-mount-${{ matrix.name }}-${{ matrix.arch }}-

      - name: Restore Docker cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-mount
          dockerfile: Dockerfile/${{ matrix.name }}/Dockerfile
          skip-extraction: ${{ steps.cache.outputs.cache-hit }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/fetburner/${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.sha }},suffix=-${{ matrix.arch }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile/${{ matrix.name }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ matrix.arch }}

  finish-docker-build:
    runs-on: ubuntu-latest
    needs:
      - docker-build-each
      - enumerate-dockerfiles
    if: ${{ needs.enumerate-dockerfiles.outputs.name != '' && toJson(fromJson(needs.enumerate-dockerfiles.outputs.name)) != '[]' }}

    strategy:
      matrix:
        name: ${{ fromJSON(needs.enumerate-dockerfiles.outputs.name) }}

    steps:
      - name: Login to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: fetburner
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/fetburner/${{ matrix.name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create multi architecture image
        run: |
          for tag in $TAGS; do
            IMAGETOOLS_ARGS+=(-t "$tag")
          done
          docker buildx imagetools create "${IMAGETOOLS_ARGS[@]}" \
            ghcr.io/fetburner/${{ matrix.name }}:${{ github.sha }}-arm64 \
            ghcr.io/fetburner/${{ matrix.name }}:${{ github.sha }}-amd64
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
